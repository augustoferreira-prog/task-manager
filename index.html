<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header> 
       <h1>  Task Manager Augusto Ferreira</h1>
    </header>

    <div>

        <aside>
            <h2>Categorías</h2>
            <ul>
                <li>Trabajo</li>
                <li>Estudio</li>
                <li>Personal</li>        
            </ul>
        </aside>

        <main> 
            <section class="task-section">
                <h2>Mis Tareas</h2>

                <div class="task-card">
                    <span class="task-title">Diseñar app</span>
                    <span class="task-category">Trabajo</span>
                    <span class="badge high">Alta</span>
                </div>

                <div class="task-card">
                    <spann class="task-title">Estudiar programación</span>
                    <span class="task-category">Estudio</span>
                    <span class="badge medium">Media</span>
                </div>

                <div class="task-card">
                    <spann class="task-title">Entrenar gym</span>
                    <span class="task-category">Personal</span>
                    <span class="badge low">Baja</span>                    
                </div>

            </section>
        </main>

    </div>
    
</body>
</html>
