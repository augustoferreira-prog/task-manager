<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de citas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
       <h1> Agenda de citas</h1>h1>
    </header>

    <div class="container">

        <aside>
            <h2>Opciones</h2>
            <ul>
                <li>Personalmente</li>
                <li>Telemáticamente</li>
                <li>Telefónicamente</li>        
            </ul>
        </aside>

        <main>
            <section class="task-list">

                <div class="task-card high">
                    <h3>Diseñar landing page</h3>
                    <span class="category">Personalmente</span>
                    <span class="badge">Alta</span>
                </div>

                <div class="task-card medium">
                    <h3>Estudiar CSS Grid</h3>
                    <span class="category">Telefónicamente</span>
                    <span class="badge">Media</span>
                </div>

                <div class="task card low">
                    <h3>Hacer ejercicio</h3>
                    <span class="category">Telemáticamente</span>
                    <span class="badge">Baja</span>                    
                </div>

            </section>
        </main>
        
    </div>
    
</body>
</html>
