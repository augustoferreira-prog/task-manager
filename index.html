<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>  
   
    <header> 
       <h1>Task Manager Augusto Ferreira</h1>
    </header>   

    <div class="container">

        <aside>
            <h2>Categorías</h2>
            <ul>
                <li>Trabajo</li>
                <li>Estudio</li>
                <li>Personal</li>        
            </ul>
        </aside>

        <main> 
            <section class="task-section">
                <h2>Lista de Tareas</h2>

                <div class="task-card">
                    <span class="task-title">Maquetar app</span>
                    <span class="task-category">(Trabajo)</span>
                    <span class="badge high">Prioridad alta</span>
                </div>

                <div class="task-card">
                    <span class="task-title">Subir proyecto a GitHub</span>
                    <span class="task-category">(Desarrollo)</span>
                    <span class="badge medium">Prioridad media</span>
                </div>

                <div class="task-card">
                    <span class="task-title">Conectar con Vercel</span>
                    <span class="task-category">(Deploy)</span>
                    <span class="badge low">Prioridad baja</span>                    
                </div>

            </section>
        </main>

    </div>
    
</body>
</html>
