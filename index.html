<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
       <h1>  Task Manager</h1>
    </header>

    <div class="container">

        <aside>
            <h2>Categorías</h2>
            <ul>
                <li>Trabajo</li>
                <li>Personal</li>
                <li>Estudio</li>        
            </ul>
        </aside>

        <main>
            <section class="task-list">

                <div class="task-card high">
                    <h3>Diseñar landing page</h3>
                    <span class="category">Trabajo</span>
                    <span class="badge">Alta</span>
                </div>

                <div class="task-card medium">
                    <h3>Estudiar CSS Grid</h3>
                    <span class="category">Estudio</span>
                    <span class="badge">Media</span>
                </div>

                <div class="task-card low">
                    <h3>Hacer ejercicio</h3>
                    <span class="category">Personal</span>
                    <span class="badge">Baja</span>                    
                </div>

            </section>
        </main>

    </div>
    
</body>
</html>
